{% set version = "0.4.1" %}

package:
  name: alphacsc
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/mne/mne-{{ version }}.tar.gz
  sha256: f1f04bfa1b71e2c054bc16a1b3c807bbde0b704c6bc33ddb5f499fbf66b18866

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython                                 # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
  host:
    - python
    - pip
    - setuptools
    - numpy
    - cython
  run:
    - python
    - mne-base
    - numba
    - scipy
    - joblib
    - matplotlib-base
    - scikit-learn

test:
  imports:
    - alphacsc
  requires:
    - python
    - pip
  commands:
    - pip check

about:
  home: https://github.com/alphacsc/alphacsc
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: 'Convolution dictionary learning for time-series.'
  description: |
    This is a library to perform shift-invariant sparse
    dictionary learning, also known as convolutional
    sparse coding (CSC), on time-series data. It is particularly
    adapted for MEEG data.
  doc_url: https://alphacsc.github.io/
  dev_url: https://github.com/alphacsc/alphacsc

extra:
  recipe-maintainers:
    - tommoral
    - larsoner
